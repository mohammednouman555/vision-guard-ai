<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VisionGuard AI Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: #e2e8f0;
}

.container {
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

h1 {
    color: #38bdf8;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

.status-box {
    font-size: 18px;
    margin: 10px 0;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-right: 10px;
    font-size: 15px;
}

.start {
    background: #22c55e;
    color: white;
}

.stop {
    background: #ef4444;
    color: white;
}

img {
    width: 100%;
    border-radius: 10px;
    border: 2px solid #334155;
}

ul {
    padding-left: 20px;
}

li {
    margin-bottom: 5px;
    font-size: 14px;
}

.badge {
    padding: 5px 10px;
    border-radius: 6px;
    font-weight: bold;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.yellow { background: #facc15; color:black; }
.gray { background: #64748b; }

</style>
</head>

<body>

<div class="container">
    <h1>🔐 VisionGuard AI Dashboard</h1>

    <div class="grid">

        <!-- LEFT SIDE -->
        <div>

            <div class="card">
                <h3>System Control</h3>

                <div class="status-box">
                    Status: <span id="status" class="badge gray">Loading...</span>
                </div>

                <div class="status-box">
                    Detection: <span id="detect" class="badge gray">Waiting...</span>
                </div>

                <br>

                <button class="start" onclick="start()">▶ Start Monitoring</button>
                <button class="stop" onclick="stop()">⏹ Stop Monitoring</button>
            </div>

            <div class="card">
                <h3>📊 Activity Logs</h3>
                <ul id="logs"></ul>
            </div>

        </div>

        <!-- RIGHT SIDE -->
        <div>
            <div class="card">
                <h3>📸 Live Camera Feed</h3>
                <img src="/video_feed" id="camera">
            </div>
        </div>

    </div>
</div>

<script>
function updateStatus(){
    fetch('/status')
    .then(res => res.json())
    .then(data => {

        // Monitoring status
        let statusEl = document.getElementById("status");
        if(data.monitoring){
            statusEl.innerText = "Monitoring";
            statusEl.className = "badge green";
        } else {
            statusEl.innerText = "Stopped";
            statusEl.className = "badge red";
        }

        // Detection status
        let detectEl = document.getElementById("detect");

        if(data.detection === "AUTHORIZED"){
            detectEl.innerText = "Authorized";
            detectEl.className = "badge green";
        }
        else if(data.detection === "INTRUDER"){
            detectEl.innerText = "Intruder!";
            detectEl.className = "badge red";
        }
        else if(data.detection === "PROCESSING"){
            detectEl.innerText = "Processing...";
            detectEl.className = "badge yellow";
        }
        else if(data.detection === "NO_FACE"){
            detectEl.innerText = "No Face";
            detectEl.className = "badge gray";
        }
        else {
            detectEl.innerText = "Idle";
            detectEl.className = "badge gray";
        }

    });
}

function updateLogs(){
    fetch('/logs')
    .then(res => res.json())
    .then(data => {
        let logs = document.getElementById("logs");
        logs.innerHTML = "";

        data.logs.reverse().forEach(log => {
            let li = document.createElement("li");
            li.innerText = log;
            logs.appendChild(li);
        });
    });
}

function start(){
    fetch('/start', {method: 'POST'});
}

function stop(){
    fetch('/stop', {method: 'POST'});
}

// Auto refresh
setInterval(updateStatus, 1000);
setInterval(updateLogs, 2000);
</script>

</body>
</html>
